<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>Admin - AutoPark</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/admin.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <img src="../img/logo2.png" />
                <span>Admin Panel</span>
            </div>
            <nav class="menu">
                <a href="/dashboard"><i class="fa fa-home"></i> Dashboard</a>
                <a href="/admin" class="active"><i class="fa fa-users"></i> Usuarios</a>
                <a href="/reportes"><i class="fa fa-chart-line"></i> Reportes</a>
            </nav>
        </aside>

        <main class="main">
            <header class="header">
                <h2><i class="fa fa-users"></i> Gestión de Usuarios</h2>
                <div class="user">
                    <button class="btn blue" onclick="openModal()"><i class="fa fa-plus"></i> Nuevo Usuario</button>
                    <img src="https://i.pravatar.cc/40" />
                </div>
            </header>

            <section class="cards">
                <div class="card blue">
                    <h3>Total Usuarios</h3>
                    <p id="totalUsuarios">0</p>
                </div>
                <div class="card green">
                    <h3>Administradores</h3>
                    <p id="totalAdmins">0</p>
                </div>
                <div class="card orange">
                    <h3>Usuarios Activos</h3>
                    <p id="totalActivos">0</p>
                </div>
            </section>

            <section class="table-box">
                <div class="table-header">
                    <h3>Lista de Usuarios</h3>
                    <input type="text" id="busqueda" placeholder="Buscar usuario..." oninput="filtrarUsuarios()" />
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Usuario</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaUsuarios">
                        <tr>
                            <td colspan="5">Cargando...</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modalTitulo">Nuevo Usuario</h3>
            <input type="hidden" id="editId" />
            <input type="text" id="inputNombre" placeholder="Nombre" />
            <input type="email" id="inputEmail" placeholder="Email" />
            <input type="text" id="inputTelefono" placeholder="Teléfono" />
            <input type="password" id="inputContrasena" placeholder="Contraseña" />
            <select id="inputRol">
                <option value="usuario">Usuario</option>
                <option value="admin">Administrador</option>
            </select>
            <select id="inputEstado">
                <option value="activo">Activo</option>
                <option value="inactivo">Inactivo</option>
            </select>
            <div class="modal-actions">
                <button class="btn green" onclick="guardarUsuario()">Guardar</button>
                <button class="btn orange" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="../js/toast.js"></script>
    <script>
        let todosLosUsuarios = [];

        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem("rol") !== "admin") {
                toast.error("Acceso denegado");
                setTimeout(() => window.location.href = "index.html", 1500);
                return;
            }
            cargarUsuarios();
        });

        async function cargarUsuarios() {
            try {
                const res = await fetch("http://localhost:3000/api/usuarios");
                const data = await res.json();
                if (!data.success) return;

                todosLosUsuarios = data.data;
                document.getElementById("totalUsuarios").innerText = todosLosUsuarios.length;
                document.getElementById("totalAdmins").innerText = todosLosUsuarios.filter(u => u.role === "admin").length;
                document.getElementById("totalActivos").innerText = todosLosUsuarios.filter(u => u.estado === "activo").length;
                renderTabla(todosLosUsuarios);
            } catch (error) {
                toast.error("Error cargando usuarios");
            }
        }

        function renderTabla(usuarios) {
            const tbody = document.getElementById("tablaUsuarios");
            if (usuarios.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">No hay usuarios registrados</td></tr>';
                return;
            }
            tbody.innerHTML = usuarios.map(u => `
          <tr>
            <td>${u.nombre}</td>
            <td>${u.email}</td>
            <td><span class="badge ${u.role === 'admin' ? 'blue' : ''}">${u.role}</span></td>
            <td><span class="badge ${u.estado === 'activo' ? 'green' : 'orange'}">${u.estado}</span></td>
            <td>
              <button class="icon-btn" onclick="editarUsuario(${u.id})"><i class="fa fa-edit"></i></button>
              <button class="icon-btn red" onclick="eliminarUsuario(${u.id})"><i class="fa fa-trash"></i></button>
            </td>
          </tr>
        `).join("");
        }

        function filtrarUsuarios() {
            const busqueda = document.getElementById("busqueda").value.toLowerCase();
            renderTabla(todosLosUsuarios.filter(u =>
                u.nombre.toLowerCase().includes(busqueda) || u.email.toLowerCase().includes(busqueda)
            ));
        }

        function openModal() {
            document.getElementById("modalTitulo").innerText = "Nuevo Usuario";
            document.getElementById("editId").value = "";
            document.getElementById("inputNombre").value = "";
            document.getElementById("inputEmail").value = "";
            document.getElementById("inputTelefono").value = "";
            document.getElementById("inputContrasena").value = "";
            document.getElementById("inputRol").value = "usuario";
            document.getElementById("inputEstado").value = "activo";
            document.getElementById("modal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("modal").style.display = "none";
        }

        function editarUsuario(id) {
            const usuario = todosLosUsuarios.find(u => u.id === id);
            if (!usuario) return;
            document.getElementById("modalTitulo").innerText = "Editar Usuario";
            document.getElementById("editId").value = usuario.id;
            document.getElementById("inputNombre").value = usuario.nombre;
            document.getElementById("inputEmail").value = usuario.email;
            document.getElementById("inputTelefono").value = usuario.telefono || "";
            document.getElementById("inputContrasena").value = "";
            document.getElementById("inputRol").value = usuario.role;
            document.getElementById("inputEstado").value = usuario.estado;
            document.getElementById("modal").style.display = "flex";
        }

        async function guardarUsuario() {
            const id = document.getElementById("editId").value;
            const nombre = document.getElementById("inputNombre").value.trim();
            const email = document.getElementById("inputEmail").value.trim();
            const telefono = document.getElementById("inputTelefono").value.trim();
            const contrasena = document.getElementById("inputContrasena").value.trim();
            const role = document.getElementById("inputRol").value;
            const estado = document.getElementById("inputEstado").value;

            if (!nombre || !email) { toast.warning("Nombre y email son obligatorios"); return; }
            if (!id && !contrasena) { toast.warning("La contraseña es obligatoria para nuevos usuarios"); return; }

            const body = { nombre, email, telefono, role, estado };
            if (contrasena) body.contrasena = contrasena;

            try {
                const url = id ? `http://localhost:3000/api/usuarios/${id}` : "http://localhost:3000/api/usuarios";
                const method = id ? "PUT" : "POST";

                const res = await fetch(url, {
                    method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (data.success) {
                    toast.success(id ? "Usuario actualizado ✅" : "Usuario creado ✅");
                    closeModal();
                    cargarUsuarios();
                } else {
                    toast.error("Error: " + data.error);
                }
            } catch (error) {
                toast.error("Error conectando con el servidor");
            }
        }

        async function eliminarUsuario(id) {
            if (!confirm("¿Estás seguro de eliminar este usuario?")) return;
            try {
                const res = await fetch(`http://localhost:3000/api/usuarios/${id}`, { method: "DELETE" });
                const data = await res.json();
                if (data.success) {
                    toast.success("Usuario eliminado ✅");
                    cargarUsuarios();
                } else {
                    toast.error("Error: " + data.error);
                }
            } catch (error) {
                toast.error("Error conectando con el servidor");
            }
        }
    </script>
</body>

</html>
