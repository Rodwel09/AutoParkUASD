<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Reportes - AutoPark</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo"><img src="../img/logo2.png"><span>Admin Panel</span></div>
            <nav class="menu">
                <a href="/dashboard"><i class="fa fa-home"></i> Inicio</a>
                <a href="/admin"><i class="fa fa-users"></i> Usuarios</a>
                <a href="/reportes" class="active"><i class="fa fa-chart-line"></i> Reportes</a>
            </nav>
        </aside>

        <main class="main">
            <header class="header">
                <h2><i class="fa fa-file-invoice-dollar"></i> Reporte de Ingresos</h2>
            </header>

            <section class="cards" style="margin-bottom: 30px;">
                <div class="card green">
                    <h3>Total Recaudado</h3>
                    <p id="granTotal">$0.00</p>
                </div>
                <div class="card blue">
                    <h3>Servicios Realizados</h3>
                    <p id="totalServicios">0</p>
                </div>
                <div class="card orange">
                    <h3>Pagos Pendientes</h3>
                    <p id="totalPendientes">0</p>
                </div>
            </section>

            <section class="table-box">
                <div class="table-header">
                    <h3>Historial de Pagos</h3>
                    <input type="text" id="busqueda" placeholder="Buscar por ticket ID..." oninput="filtrarPagos()" />
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Ticket ID</th>
                            <th>Fecha de Pago</th>
                            <th>Monto</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="listaReporte">
                        <tr>
                            <td colspan="4">Cargando...</td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <section class="table-box" style="margin-top: 30px;">
                <h3>Tickets Pendientes de Pago</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Ticket ID</th>
                            <th>Vehículo ID</th>
                            <th>Hora Entrada</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="listaPendientes">
                        <tr>
                            <td colspan="4">Cargando...</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="../js/toast.js"></script>
    <script>
        let todosPagos = [];

        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem("rol") !== "admin") {
                toast.error("Acceso denegado");
                setTimeout(() => window.location.href = "index.html", 1500);
                return;
            }
            cargarReportes();
        });

        async function cargarReportes() {
            try {
                const [resPagos, resTickets] = await Promise.all([
                    fetch("http://localhost:3000/api/pagos"),
                    fetch("http://localhost:3000/api/tickets")
                ]);

                const dataPagos = await resPagos.json();
                const dataTickets = await resTickets.json();

                if (dataPagos.success) {
                    todosPagos = dataPagos.data;
                    const suma = todosPagos.reduce((acc, p) => acc + parseFloat(p.monto || 0), 0);
                    document.getElementById("granTotal").innerText = `$${suma.toFixed(2)}`;
                    document.getElementById("totalServicios").innerText = todosPagos.length;
                    renderPagos(todosPagos);
                }

                if (dataTickets.success) {
                    const pendientes = dataTickets.data.filter(t => t.status_de_pago === "pendiente");
                    document.getElementById("totalPendientes").innerText = pendientes.length;

                    const tbodyPendientes = document.getElementById("listaPendientes");
                    tbodyPendientes.innerHTML = pendientes.length === 0
                        ? '<tr><td colspan="4">No hay tickets pendientes</td></tr>'
                        : pendientes.map(t => `
                            <tr>
                                <td>${t.id}</td>
                                <td>${t.vehiculo_id}</td>
                                <td>${new Date(t.fecha_hora_entrada).toLocaleString()}</td>
                                <td><span class="badge orange">PENDIENTE</span></td>
                            </tr>
                        `).join("");
                }

            } catch (error) {
                toast.error("Error cargando reportes");
                console.error(error);
            }
        }

        function renderPagos(pagos) {
            const tbody = document.getElementById("listaReporte");
            tbody.innerHTML = pagos.length === 0
                ? '<tr><td colspan="4">No hay pagos registrados</td></tr>'
                : pagos.slice().reverse().map(p => `
                    <tr>
                        <td>${p.ticket_id}</td>
                        <td>${new Date(p.fecha_de_pago).toLocaleString()}</td>
                        <td style="color: #2ecc71; font-weight: bold;">$${parseFloat(p.monto).toFixed(2)}</td>
                        <td><span class="badge green">PAGADO</span></td>
                    </tr>
                `).join("");
        }

        function filtrarPagos() {
            const busqueda = document.getElementById("busqueda").value.toLowerCase();
            renderPagos(todosPagos.filter(p => String(p.ticket_id).includes(busqueda)));
        }
    </script>
</body>

</html>
