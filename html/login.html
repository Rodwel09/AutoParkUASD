<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - AutoPark</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../js/api.js"></script>
</head>

<body>
    <div class="login-container">
        <div class="bg-image"></div>
        <div class="login-box">
            <div class="logo">
                <img src="../img/logo2.png" alt="Logo">
            </div>
            <div class="form">
                <div class="input">
                    <i class="fas fa-user"></i>
                    <input type="text" id="userInput" placeholder="Usuario" required>
                </div>
                <div class="input">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="passInput" placeholder="Contraseña" required>
                </div>
                <p id="errorMsg" style="color: red; font-size: 13px; margin-bottom: 10px; display: none;"></p>
                <button class="btn blue" onclick="login()">INICIAR SESIÓN</button>
            </div>
        </div>
    </div>

    <script>
        async function login() {
            const user = document.getElementById("userInput").value.trim();
            const pass = document.getElementById("passInput").value.trim();
            const errorMsg = document.getElementById("errorMsg");

            errorMsg.style.display = "none";

            if (!user || !pass) {
                errorMsg.innerText = "Completa todos los campos";
                errorMsg.style.display = "block";
                return;
            }

            try {
                const data = await peticionBackend('usuarios/login', 'POST', { nombre: user, contrasena: pass })

                if (!data.success) {
                    errorMsg.innerText = data.error || "Usuario o contraseña incorrectos";
                    errorMsg.style.display = "block";
                    return;
                }

                localStorage.setItem("rol", data.data.role)
                localStorage.setItem("usuario_id", data.data.id)
                localStorage.setItem("nombre", data.data.nombre)
                window.location.href = "index.html"

            } catch (error) {
                errorMsg.innerText = "No se pudo conectar con el servidor";
                errorMsg.style.display = "block";
                console.error(error);
            }
        }

        // Login con Enter
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") login();
        });
    </script>
</body>

</html>
