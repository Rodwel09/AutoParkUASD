<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoPark - Registrar Entrada</title>
    <link rel="stylesheet" href="../css/entrada.css" />
    <link rel="icon" type="image/png" href="../img/logo2.png" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <img src="../img/logo2.png" alt="AutoPark" />
                <span>Sistema de parqueo</span>
            </div>
            <nav>
                <a href="index.html"><i class="fas fa-home"></i> Inicio</a>
                <a class="active" href="entrada.html"><i class="fas fa-car"></i> Registrar Entrada</a>
                <a href="salida.html"><i class="fas fa-sign-out-alt"></i> Registrar Salida</a>
                <a href="#"><i class="fas fa-search"></i> Consultar Vehículos</a>
                <a href="#"><i class="fas fa-chart-bar"></i> Reportes</a>
            </nav>
        </aside>

        <main class="main">
            <div class="topbar">
                <h2>Registrar Entrada</h2>
                <div class="user">
                    <i class="fas fa-cog"></i>
                    <img src="https://i.pravatar.cc/40" />
                </div>
            </div>

            <div class="content">
                <div class="card form">
                    <h3>Placa del Vehículo</h3>
                    <div class="switch">
                        <span>Capturar foto</span>
                        <label class="toggle">
                            <input type="checkbox" />
                            <span class="slider"></span>
                        </label>
                    </div>
                    <input type="text" id="placa" placeholder="Ej: MCX-5585" />
                    <select id="tipo">
                        <option value="carro">Automóvil</option>
                        <option value="motocicleta">Motor</option>
                    </select>
                    <input type="datetime-local" id="fecha" />
                    <button class="btn-primary" onclick="registrarEntrada()">REGISTRAR ENTRADA</button>
                </div>

                <div class="card table">
                    <h3>Últimos Ingresos</h3>
                    <div class="filters">
                        <input type="text" placeholder="Placa" />
                        <select>
                            <option>Todo</option>
                            <option>Hoy</option>
                        </select>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Vehículo ID</th>
                                <th>Estado Pago</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaIngresos">
                            <tr>
                                <td colspan="4">Cargando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/toast.js"></script>
    <script>
        async function registrarEntrada() {
            const placa = document.getElementById("placa").value.trim().toUpperCase();
            const tipo = document.getElementById("tipo").value;
            let fecha = document.getElementById("fecha").value;

            if (!placa) {
                toast.warning("Ingresa la placa del vehículo");
                return;
            }

            if (!fecha) fecha = new Date().toISOString().slice(0, 16);

            try {
                const resVehiculo = await fetch("http://localhost:3000/api/vehiculos", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        placa,
                        tipo,
                        usuario_id: parseInt(localStorage.getItem("usuario_id")) || 1
                    })
                });

                const dataVehiculo = await resVehiculo.json();

                if (!dataVehiculo.success) {
                    toast.error("Error al registrar vehículo: " + dataVehiculo.error);
                    return;
                }

                const resTicket = await fetch("http://localhost:3000/api/tickets", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        vehiculo_id: dataVehiculo.id,
                        fecha_hora_entrada: new Date(fecha).toISOString().slice(0, 19).replace("T", " "),
                        status_de_pago: "pendiente"
                    })
                });

                const dataTicket = await resTicket.json();

                if (dataTicket.success) {
                    toast.success("Entrada registrada 🚗");
                    document.getElementById("placa").value = "";
                    document.getElementById("fecha").value = "";
                    cargarUltimosIngresos();
                } else {
                    toast.error("Error al crear ticket: " + dataTicket.error);
                }

            } catch (error) {
                toast.error("No se pudo conectar con el servidor");
                console.error(error);
            }
        }

        async function cargarUltimosIngresos() {
            try {
                const res = await fetch("http://localhost:3000/api/tickets");
                const data = await res.json();
                const tbody = document.getElementById("tablaIngresos");

                if (!data.success || data.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No hay ingresos registrados</td></tr>';
                    return;
                }

                tbody.innerHTML = data.data.slice(-10).reverse().map(t => `
            <tr>
              <td>${new Date(t.fecha_hora_entrada).toLocaleString()}</td>
              <td>${t.vehiculo_id}</td>
              <td><span class="badge ${t.status_de_pago === 'pendiente' ? 'blue' : 'green'}">${t.status_de_pago.toUpperCase()}</span></td>
              <td><span class="badge green">VER</span></td>
            </tr>
          `).join("");
            } catch (error) {
                console.error("Error cargando ingresos:", error);
            }
        }

        document.addEventListener("DOMContentLoaded", cargarUltimosIngresos);
    </script>
</body>

</html>
